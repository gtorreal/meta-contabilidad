# Postgres solo en loopback del host (evita escuchar 0.0.0.0:5433).
# Para acceso desde otra máquina en la red, cambia a "5433:5432" de forma consciente.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: meta
      POSTGRES_PASSWORD: meta
      POSTGRES_DB: meta_contabilidad
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - meta_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meta -d meta_contabilidad"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  meta_pg_data:
