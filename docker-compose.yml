services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: meta
      POSTGRES_PASSWORD: meta
      POSTGRES_DB: meta_contabilidad
    ports:
      - "5433:5432"
    volumes:
      - meta_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meta -d meta_contabilidad"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  meta_pg_data:
