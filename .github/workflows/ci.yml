name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install
        run: pnpm install

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build shared
        run: pnpm --filter @meta-contabilidad/shared build

      - name: Prisma generate
        run: pnpm db:generate

      - name: Build API
        run: pnpm --filter @meta-contabilidad/api build

      - name: Build web
        run: pnpm --filter @meta-contabilidad/web build
